name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-native:
    name: build-native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "21"
          cache: maven

      - name: Install native-image
        shell: bash
        run: gu install native-image

      - name: Configure Maven toolchains
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/toolchains.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>21</version>
                <vendor>GraalVM</vendor>
              </provides>
              <configuration>
                <jdkHome>${JAVA_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Build native image
        shell: bash
        run: mvn -q -DskipTests -Pnative package

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/mcp-sql.exe dist/mcp-sql-windows-x86_64.exe
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            cp target/mcp-sql dist/mcp-sql-macos-x86_64
          else
            cp target/mcp-sql dist/mcp-sql-linux-x86_64
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
